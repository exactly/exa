name: version
on:
  push:
    branches: [main]
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
  version:
    environment: version
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24, check-latest: true, package-manager-cache: false }
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: v1.5.1, cache: false }
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
        env: { REDISMS_DISABLE_POSTINSTALL: "true" }
      - id: title
        run: |
          pnpm changeset status --output=status.json 2>/dev/null || echo '{"releases":[]}' > status.json
          node -e 'console.log("title=🔖 release: " + require("./status.json").releases
            .filter(({ type }) => type !== "none")
            .map(({ name, newVersion }) => name.replace("@exactly/", "") + "@" + newVersion)
            .reverse()
            .join(", "))' >> $GITHUB_OUTPUT
          rm status.json
      - uses: actions/create-github-app-token@v3
        id: github
        with:
          client-id: Iv23liuyLJGozoujn17O # cspell:ignore Iv23liuyLJGozoujn17O
          private-key: ${{ secrets.EXA_VERSION_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - id: changesets
        uses: changesets/action@v1
        with:
          title: ${{ steps.title.outputs.title }}
          github-token: ${{ steps.github.outputs.token }}
          commitMode: github-api
          publish: pnpm changeset publish
          version: ./.changeset/version.sh
          prDraft: create
