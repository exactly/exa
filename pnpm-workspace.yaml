allowBuilds:
  '@bufbuild/buf': true
  '@embedded-postgres/darwin-arm64': true
  '@sentry-internal/node-cpu-profiler': true
  '@sentry/cli': true
  better-sqlite3: true
  bufferutil: true
  es5-ext: true
  esbuild: true
  msgpackr-extract: true
  nx: true
  protolint: true
  redis-memory-server: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true
auditConfig:
  ignoreGhsas:
    - GHSA-w5hq-g745-h8pq
    - GHSA-848j-6mx2-7j84
autoInstallPeers: false
blockExoticSubdeps: false
catalog:
  "@aa-sdk/core": &aaSDK ^4.88.4
  "@account-kit/infra": *aaSDK
  "@account-kit/smart-contracts": *aaSDK
  tamagui: &tamagui ^2.1.0
  "@tamagui/animations-reanimated": *tamagui
  "@tamagui/babel-plugin": *tamagui
  "@tamagui/config": *tamagui
  "@tamagui/core": *tamagui
  "@tamagui/helpers-icon": *tamagui
  "@tamagui/lucide-icons-2": *tamagui
  "@tamagui/sizable-context": *tamagui
  "@tamagui/toast": *tamagui
  "@wagmi/core": ^3.5.0
  eslint: ^10.4.1
  hono: ^4.12.24
  i18next: ^26.3.1
  ioredis: ^5.11.1
  prettier: ^3.8.3
  react: &react "19.2.3"
  react-dom: *react
  typescript: ^5.9.3
  typescript-eslint: &typescriptEslint ^8.61.0
  "@typescript-eslint/utils": *typescriptEslint
  valibot: ^1.4.1
  viem: ^2.52.2
  wagmi: ^3.6.16
ignoreWorkspaceRootCheck: true
includeWorkspaceRoot: true
minimumReleaseAgeStrict: true
overrides:
  '@typescript-eslint/eslint-plugin': *typescriptEslint
  '@typescript-eslint/parser': *typescriptEslint
  '@typescript-eslint/project-service': *typescriptEslint
  '@typescript-eslint/scope-manager': *typescriptEslint
  '@typescript-eslint/tsconfig-utils': *typescriptEslint
  '@typescript-eslint/type-utils': *typescriptEslint
  '@typescript-eslint/types': *typescriptEslint
  '@typescript-eslint/typescript-estree': *typescriptEslint
  '@typescript-eslint/utils': *typescriptEslint
  '@typescript-eslint/visitor-keys': *typescriptEslint
  comlink: $comlink
  esbuild@0.18.20: ^0.25.0
  glob@11.0.3: ^11.1.0
  js-cookie@3.0.1: ^3.0.7
  tar: ^7.5.11
  typescript@5: 'catalog:'
  ws@8: ^8.20.1
  '@anthropic-ai/claude-code': npm:@favware/skip-dependency@1.2.2
  '@bigmi/core': npm:@favware/skip-dependency@1.2.2
  '@gnosis.pm/safe-contracts': npm:@favware/skip-dependency@1.2.2
  '@mysten/sui': npm:@favware/skip-dependency@1.2.2
  '@mysten/wallet-standard': npm:@favware/skip-dependency@1.2.2
  '@nomiclabs/hardhat-etherscan': npm:@favware/skip-dependency@1.2.2
  '@solana/wallet-adapter-base': npm:@favware/skip-dependency@1.2.2
  '@solana/web3.js': npm:@favware/skip-dependency@1.2.2
  '@thehubbleproject/bls': npm:@favware/skip-dependency@1.2.2
  '@typechain/hardhat': npm:@favware/skip-dependency@1.2.2
  '@types/mocha': npm:@favware/skip-dependency@1.2.2
  '@wagmi/connectors': npm:@favware/skip-dependency@1.2.2
  bech32: npm:@favware/skip-dependency@1.2.2
  bs58: npm:@favware/skip-dependency@1.2.2
  bitcoinjs-lib: npm:@favware/skip-dependency@1.2.2
  ethereumjs-util: npm:@favware/skip-dependency@1.2.2
  ethereumjs-wallet: npm:@favware/skip-dependency@1.2.2
  hardhat-deploy: npm:@favware/skip-dependency@1.2.2
  hardhat-deploy-ethers: npm:@favware/skip-dependency@1.2.2
  solidity-coverage: npm:@favware/skip-dependency@1.2.2
packages:
  - "."
  - common
  - contracts
  - docs
  - server
  - substreams
  - .maestro
patchedDependencies:
  '@lifi/sdk': patches/@lifi__sdk.patch
  embedded-postgres: patches/embedded-postgres.patch
  eslint-config-universe: patches/eslint-config-universe.patch
peerDependencyRules:
  allowedVersions:
    '@farcaster/miniapp-wagmi-connector>@wagmi/core': '3'
    '@hono/mcp>hono-rate-limiter': '0.5'
    esbuild-register>esbuild: '0.27'
    eslint: '10'
    rollup-plugin-import-trace>vite: '8'
publicHoistPattern:
  - "@babel/runtime"
  - "@react-native/assets-registry"
  - "@react-native/gradle-plugin"
  - "@sentry/cli"
  - expo-asset
  - expo-modules-autolinking
  - react-native-web
  - sharp
updateConfig:
  ignoreDependencies:
    - '@expo/fingerprint'
    - '@expo/metro-runtime'
    - '@hono/valibot-validator'
    - '@lifi/sdk'
    - '@openzeppelin/contracts-v4'
    - '@openzeppelin/contracts-upgradeable-v4'
    - '@react-native-async-storage/async-storage'
    - '@types/react'
    - account-abstraction
    - babel-preset-expo
    - expo-asset
    - expo-build-properties
    - expo-camera
    - expo-clipboard
    - expo-constants
    - expo-dev-client
    - expo-font
    - expo-image
    - expo-insights
    - expo-linear-gradient
    - expo-linking
    - expo-router
    - expo-status-bar
    - expo-system-ui
    - expo-updates
    - expo-web-browser
    - hono-openapi
    - metro-config
    - react
    - react-dom
    - react-native
    - react-native-gesture-handler
    - react-native-quick-crypto
    - react-native-reanimated
    - react-native-safe-area-context
    - react-native-screens
    - react-native-svg
    - react-native-worklets
    - typescript
