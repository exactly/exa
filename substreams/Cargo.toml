[package]
name = "exactly-substreams"
version = "0.1.0"
edition = "2021"
repository = "https://github.com/exactly/mobile"

[lib]
name = "substreams"
crate-type = ["cdylib"]

[dependencies]
ethabi = "17"
hex-literal = "0.3"
num-bigint = "0.4"
prost = "0.13.5"
prost-types = "0.13.5"
substreams = "=0.6.1"
substreams-database-change = "2.0.0"
substreams-ethereum = "0.10"
substreams-ethereum-core = "0.10"

# force dependencies to use specific versions of prost
prost-derive = "0.13.5"
prost-build = "0.13.5"

[target.wasm32-unknown-unknown.dependencies]
getrandom = { version = "0.2", features = ["custom"] }

[build-dependencies]
anyhow = "1"
substreams-ethereum = "0.10"

[profile.release]
lto = true
opt-level = 's'
strip = "debuginfo"

