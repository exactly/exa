syntax = "proto3";

package exa;

message Accounts {
  repeated bytes accounts = 1;
}

message Deposits {
  repeated Deposit deposits = 1;
}

message Deposit {
  bytes market = 1;
  bytes receiver = 2;
  string amount = 3;
  uint64 block_number = 4;
  uint64 tx_index = 5;
  uint64 log_index = 6;
}

message Transfers {
  repeated Transfer transfers = 1;
}

message Transfer {
  bytes asset = 1;
  bytes receiver = 2;
}
