specVersion: v0.1.0
package:
  name: exactly
  version: v0.1.0
protobuf:
  files:
    - exa.proto
  importPaths:
    - proto
imports:
  sql: https://github.com/streamingfast/substreams-sink-sql/releases/download/protodefs-v1.0.7/substreams-sink-sql-protodefs-v1.0.7.spkg
network: anvil
modules:
  - name: map_blocks
    kind: map
    inputs:
      - params: string
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:exa.Events
  - name: db_out
    kind: map
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_blocks
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
sink:
  module: db_out
  type: sf.substreams.sink.sql.v1.Service
  config:
    schema: node_modules/@exactly/server/generated/schema.sql
    engine: postgres
binaries:
  default:
    type: wasm/rust-v1
    file: target/wasm32-unknown-unknown/release/substreams.wasm
networks:
  anvil:
    initialBlock:
      map_blocks: 0
    params:
      map_blocks: Eb2454D494082f2294Fc5d4Cd67096f13E64306f
